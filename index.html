<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>احسب عمرك وبرجك · هجري وميلادي</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Cairo (display + body) -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      /* لوحة "الإسطرلاب": نيلي ليلي + نحاس ذهبي */
      --ink-900: #0b1026;   /* أعمق نيلي */
      --ink-800: #11173a;
      --ink-700: #1a2150;
      --ink-600: #232c66;
      --brass-400: #e7c873; /* ذهب فاتح */
      --brass-500: #d4af37; /* نحاس ذهبي */
      --brass-600: #b8923a;
      --parchment: #f4ecd8; /* رقّ */
      --parchment-dim: #cfc6ad;
      --star: #f6e8b8;
      --error: #f0a7a0;

      --font-display: "Cairo", sans-serif;
      --font-body: "Cairo", sans-serif;

      --radius: 18px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: var(--font-body);
      color: var(--parchment);
      background:
        radial-gradient(1200px 700px at 80% -10%, rgba(212,175,55,0.10), transparent 60%),
        radial-gradient(900px 600px at 10% 110%, rgba(120,140,255,0.10), transparent 55%),
        linear-gradient(160deg, var(--ink-900), var(--ink-800) 55%, #070a1c);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px;
      overflow-x: hidden;
    }

    /* ===== خلفية: نجوم متلألئة + نمط هندسي إسلامي ===== */
    .sky {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .sky::before {
      /* حقل نجوم */
      content: "";
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1.4px 1.4px at 20% 30%, rgba(246,232,184,0.9), transparent),
        radial-gradient(1.2px 1.2px at 70% 20%, rgba(246,232,184,0.7), transparent),
        radial-gradient(1.6px 1.6px at 40% 70%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1.1px 1.1px at 85% 60%, rgba(246,232,184,0.6), transparent),
        radial-gradient(1.3px 1.3px at 55% 45%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.2px 1.2px at 12% 80%, rgba(246,232,184,0.7), transparent);
      animation: twinkle 6s ease-in-out infinite alternate;
    }
    @keyframes twinkle { from { opacity: 0.5; } to { opacity: 1; } }

    /* قرص الإسطرلاب الدوّار الباهت خلف البطاقة */
    .astrolabe {
      position: fixed;
      width: min(820px, 130vw);
      height: min(820px, 130vw);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      z-index: 0;
      opacity: 0.28;
      background:
        repeating-conic-gradient(from 0deg, transparent 0 9deg, rgba(212,175,55,0.16) 9deg 9.6deg);
      mask: radial-gradient(circle, transparent 38%, #000 39%, #000 60%, transparent 61%);
      -webkit-mask: radial-gradient(circle, transparent 38%, #000 39%, #000 60%, transparent 61%);
      animation: spin 90s linear infinite;
    }
    .astrolabe.inner {
      width: min(520px, 90vw);
      height: min(520px, 90vw);
      opacity: 0.22;
      animation: spin 60s linear infinite reverse;
      mask: radial-gradient(circle, transparent 30%, #000 31%, #000 55%, transparent 56%);
      -webkit-mask: radial-gradient(circle, transparent 30%, #000 31%, #000 55%, transparent 56%);
      background: repeating-conic-gradient(from 0deg, transparent 0 14deg, rgba(231,200,115,0.18) 14deg 15deg);
    }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    /* ===== اللوحة (البطاقة) ===== */
    .plate {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 480px;
      background:
        linear-gradient(180deg, rgba(26,33,80,0.92), rgba(11,16,38,0.94));
      border: 1px solid rgba(212,175,55,0.35);
      border-radius: var(--radius);
      padding: 40px 34px 34px;
      box-shadow:
        0 0 0 1px rgba(212,175,55,0.10),
        0 30px 80px -20px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.05);
      backdrop-filter: blur(2px);
      animation: rise 0.9s var(--ease) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(26px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* زخارف الزوايا النحاسية */
    .plate::before, .plate::after {
      content: "";
      position: absolute;
      width: 34px; height: 34px;
      border: 2px solid var(--brass-500);
      opacity: 0.7;
    }
    .plate::before { top: 12px; right: 12px; border-left: none; border-bottom: none; border-radius: 0 8px 0 0; }
    .plate::after  { bottom: 12px; left: 12px; border-right: none; border-top: none; border-radius: 0 0 0 8px; }

    .eyebrow {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      font-size: 12px; letter-spacing: 0.18em;
      color: var(--brass-400);
      margin-bottom: 14px;
      animation: fade 0.9s var(--ease) 0.15s both;
    }
    .eyebrow span { display: inline-block; }
    .eyebrow .line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--brass-500), transparent); max-width: 80px; }

    h1 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(28px, 7vw, 38px);
      text-align: center;
      line-height: 1.25;
      background: linear-gradient(180deg, #fff, var(--brass-400));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      animation: fade 0.9s var(--ease) 0.22s both;
    }
    .sub {
      text-align: center;
      color: var(--parchment-dim);
      font-size: 13px;
      font-weight: 300;
      margin-bottom: 30px;
      animation: fade 0.9s var(--ease) 0.3s both;
    }
    @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

    label {
      display: block;
      font-family: var(--font-display);
      font-size: 15px;
      color: var(--brass-400);
      margin-bottom: 10px;
    }
    .field { animation: fade 0.9s var(--ease) 0.38s both; }
    .row { display: flex; gap: 12px; }
    .date-grid { display: grid; grid-template-columns: 1fr 1.4fr 1.1fr; gap: 10px; }
    .date-grid .col { display: flex; flex-direction: column; gap: 6px; }
    .date-grid .col small { font-size: 11px; color: var(--parchment-dim); text-align: center; }

    select {
      width: 100%;
      padding: 14px 12px;
      font-family: var(--font-display);
      font-size: 17px;
      text-align: center;
      text-align-last: center;
      color: var(--star);
      background: rgba(7,10,28,0.6);
      border: 1.5px solid rgba(212,175,55,0.30);
      border-radius: 12px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease), background 0.25s;
    }
    select:focus {
      border-color: var(--brass-500);
      background: rgba(7,10,28,0.85);
      box-shadow: 0 0 0 4px rgba(212,175,55,0.12);
    }
    select option { background: var(--ink-800); color: var(--star); }

    input {
      flex: 1;
      width: 100%;
      padding: 14px 16px;
      font-family: var(--font-display);
      font-size: 22px;
      text-align: center;
      color: var(--star);
      background: rgba(7,10,28,0.6);
      border: 1.5px solid rgba(212,175,55,0.30);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease), background 0.25s;
    }
    input::placeholder { color: rgba(207,198,173,0.4); }
    input:focus {
      border-color: var(--brass-500);
      background: rgba(7,10,28,0.85);
      box-shadow: 0 0 0 4px rgba(212,175,55,0.12), 0 0 24px rgba(212,175,55,0.18);
    }
    /* إخفاء أسهم الـ number */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; appearance: textfield; }

    button {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      padding: 0 26px;
      color: var(--ink-900);
      background: linear-gradient(180deg, var(--brass-400), var(--brass-600));
      border: none;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s var(--ease), box-shadow 0.25s var(--ease);
      box-shadow: 0 8px 20px -6px rgba(212,175,55,0.5);
      white-space: nowrap;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 12px 28px -6px rgba(212,175,55,0.6); }
    button:active { transform: translateY(0) scale(0.98); }
    /* لمعة عابرة */
    button::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.55) 50%, transparent 70%);
      transform: translateX(-120%);
      transition: transform 0.6s var(--ease);
    }
    button:hover::after { transform: translateX(120%); }

    .error {
      color: var(--error);
      font-size: 13px;
      margin-top: 12px;
      min-height: 1.2rem;
      text-align: center;
    }

    /* ===== النتائج ===== */
    .results { margin-top: 28px; }

    .celestial-divider {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      margin: 6px 0 20px;
      color: var(--brass-400);
    }
    .celestial-divider .l { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.6), transparent); }
    .celestial-divider .star { font-size: 14px; animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.5; transform: scale(0.9);} 50% { opacity: 1; transform: scale(1.15);} }

    .reading {
      position: relative;
      background: linear-gradient(180deg, rgba(35,44,102,0.55), rgba(11,16,38,0.55));
      border: 1px solid rgba(212,175,55,0.28);
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 14px;
      overflow: hidden;
      animation: revealCard 0.7s var(--ease) both;
    }
    .reading:nth-child(2) { animation-delay: 0.05s; }
    .reading:nth-child(4) { animation-delay: 0.18s; }
    @keyframes revealCard {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: none; }
    }
    /* شريط نحاسي على الحافة */
    .reading::before {
      content: ""; position: absolute; top: 0; bottom: 0; right: 0; width: 4px;
      background: linear-gradient(180deg, var(--brass-400), var(--brass-600));
    }

    .reading .k {
      font-family: var(--font-display);
      font-size: 13px;
      letter-spacing: 0.04em;
      color: var(--brass-400);
      margin-bottom: 6px;
      display: flex; align-items: center; gap: 8px;
    }
    .reading .v {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(28px, 8vw, 38px);
      color: var(--star);
      line-height: 1.1;
    }
    .reading .v .unit { font-size: 0.5em; color: var(--brass-400); margin-right: 4px; }
    .reading .note {
      font-size: 12px;
      font-weight: 300;
      color: var(--parchment-dim);
      margin-top: 8px;
      line-height: 1.6;
    }

    /* ===== العمر الكامل ===== */
    .age-exact {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
      animation: revealCard 0.7s var(--ease) both;
    }
    .age-cell {
      background: linear-gradient(180deg, rgba(212,175,55,0.16), rgba(11,16,38,0.4));
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 12px;
      padding: 14px 6px;
      text-align: center;
    }
    .age-cell .num {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(26px, 8vw, 34px);
      color: var(--star);
      line-height: 1;
    }
    .age-cell .lbl { font-size: 12px; color: var(--brass-400); margin-top: 6px; }

    /* ===== البرج ===== */
    .zodiac {
      position: relative;
      display: flex; align-items: center; gap: 16px;
      background: linear-gradient(180deg, rgba(35,44,102,0.6), rgba(11,16,38,0.6));
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 14px;
      overflow: hidden;
      animation: revealCard 0.7s var(--ease) 0.1s both;
    }
    .zodiac::before {
      content: ""; position: absolute; top: 0; bottom: 0; right: 0; width: 4px;
      background: linear-gradient(180deg, var(--brass-400), var(--brass-600));
    }
    .zodiac .glyph {
      font-size: 42px; line-height: 1;
      color: var(--brass-400);
      text-shadow: 0 0 18px rgba(212,175,55,0.5);
      animation: floatGlyph 3.5s ease-in-out infinite;
    }
    @keyframes floatGlyph { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .zodiac .meta .k { font-size: 13px; color: var(--brass-400); margin-bottom: 4px; }
    .zodiac .meta .name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 26px;
      color: var(--star);
      line-height: 1.1;
    }
    .zodiac .meta .range { font-size: 12px; color: var(--parchment-dim); margin-top: 4px; }

    .footer {
      text-align: center;
      margin-top: 22px;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: rgba(207,198,173,0.5);
    }

    @media (max-width: 420px) {
      .plate { padding: 32px 22px 26px; }
      .row { flex-direction: column; }
      button { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="sky"></div>
  <div class="astrolabe"></div>
  <div class="astrolabe inner"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function toArabicDigits(value) {
      const map = { "0":"٠","1":"١","2":"٢","3":"٣","4":"٤","5":"٥","6":"٦","7":"٧","8":"٨","9":"٩" };
      return String(value).replace(/[0-9]/g, (d) => map[d]);
    }

    // التاريخ الهجري الكامل لتاريخ ميلادي معيّن
    function toHijriParts(date) {
      const fmt = new Intl.DateTimeFormat("ar-SA-u-ca-islamic-umalqura", {
        day: "numeric", month: "long", year: "numeric",
      });
      return fmt.format(date); // مثل: ١٥ رمضان ١٤٤٥ هـ
    }

    // حساب العمر الكامل بالسنوات والأشهر والأيام
    function exactAge(birth, today) {
      let y = today.getFullYear() - birth.getFullYear();
      let m = today.getMonth() - birth.getMonth();
      let d = today.getDate() - birth.getDate();
      if (d < 0) {
        m -= 1;
        // عدد أيام الشهر السابق للتاريخ الحالي
        const prevMonth = new Date(today.getFullYear(), today.getMonth(), 0).getDate();
        d += prevMonth;
      }
      if (m < 0) { y -= 1; m += 12; }
      return { years: y, months: m, days: d };
    }

    // الأبراج الفلكية (الغربية) — بالترتيب مع حدود التواريخ
    const ZODIAC = [
      { name: "الجَدْي",   glyph: "♑", from: [12, 22], to: [1, 19],  range: "٢٢ ديسمبر – ١٩ يناير" },
      { name: "الدَّلو",   glyph: "♒", from: [1, 20],  to: [2, 18],  range: "٢٠ يناير – ١٨ فبراير" },
      { name: "الحُوت",    glyph: "♓", from: [2, 19],  to: [3, 20],  range: "١٩ فبراير – ٢٠ مارس" },
      { name: "الحَمَل",   glyph: "♈", from: [3, 21],  to: [4, 19],  range: "٢١ مارس – ١٩ أبريل" },
      { name: "الثَّور",   glyph: "♉", from: [4, 20],  to: [5, 20],  range: "٢٠ أبريل – ٢٠ مايو" },
      { name: "الجَوزاء",  glyph: "♊", from: [5, 21],  to: [6, 20],  range: "٢١ مايو – ٢٠ يونيو" },
      { name: "السَّرَطان",glyph: "♋", from: [6, 21],  to: [7, 22],  range: "٢١ يونيو – ٢٢ يوليو" },
      { name: "الأسَد",    glyph: "♌", from: [7, 23],  to: [8, 22],  range: "٢٣ يوليو – ٢٢ أغسطس" },
      { name: "العَذراء",  glyph: "♍", from: [8, 23],  to: [9, 22],  range: "٢٣ أغسطس – ٢٢ سبتمبر" },
      { name: "الميزان",   glyph: "♎", from: [9, 23],  to: [10, 22], range: "٢٣ سبتمبر – ٢٢ أكتوبر" },
      { name: "العَقرَب",  glyph: "♏", from: [10, 23], to: [11, 21], range: "٢٣ أكتوبر – ٢١ نوفمبر" },
      { name: "القَوس",    glyph: "♐", from: [11, 22], to: [12, 21], range: "٢٢ نوفمبر – ٢١ ديسمبر" },
    ];

    function getZodiac(month, day) { // month: 1-12
      for (const z of ZODIAC) {
        const [fm, fd] = z.from, [tm, td] = z.to;
        if (fm === tm) { if (month === fm && day >= fd && day <= td) return z; }
        else if (
          (month === fm && day >= fd) ||
          (month === tm && day <= td)
        ) return z;
      }
      // الجدي يلتف عبر نهاية السنة
      return ZODIAC[0];
    }

    const MONTHS_AR = [
      "يناير","فبراير","مارس","أبريل","مايو","يونيو",
      "يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر",
    ];

    function Reading({ glyph, kicker, value, note }) {
      return (
        <div className="reading">
          <div className="k"><span>{glyph}</span>{kicker}</div>
          <div className="v">{value}</div>
          {note && <div className="note">{note}</div>}
        </div>
      );
    }

    function App() {
      const TODAY = new Date(2026, 5, 7); // ٧ يونيو ٢٠٢٦
      const thisYear = TODAY.getFullYear();

      const [day, setDay] = useState("");
      const [month, setMonth] = useState("");
      const [year, setYear] = useState("");
      const [error, setError] = useState("");
      const [result, setResult] = useState(null);
      const [tick, setTick] = useState(0);

      const years = [];
      for (let y = thisYear; y >= thisYear - 120; y--) years.push(y);
      const days = [];
      for (let d = 1; d <= 31; d++) days.push(d);

      function compute() {
        setError("");
        if (day === "" || month === "" || year === "") {
          setResult(null);
          setError("الرجاء اختيار اليوم والشهر والسنة.");
          return;
        }
        const d = Number(day), m = Number(month), y = Number(year);
        const birth = new Date(y, m - 1, d);
        // التحقق من صحة التاريخ (مثلاً ٣١ فبراير غير صالح)
        if (birth.getFullYear() !== y || birth.getMonth() !== m - 1 || birth.getDate() !== d) {
          setResult(null);
          setError("هذا التاريخ غير صحيح، الرجاء التحقق من اليوم والشهر.");
          return;
        }
        if (birth > TODAY) {
          setResult(null);
          setError("تاريخ الميلاد في المستقبل! الرجاء إدخال تاريخ صحيح.");
          return;
        }

        const age = exactAge(birth, TODAY);
        const zodiac = getZodiac(m, d);
        const hijri = toHijriParts(birth);
        const gregText = `${toArabicDigits(d)} ${MONTHS_AR[m - 1]} ${toArabicDigits(y)} م`;

        setResult({ age, zodiac, hijri, gregText });
        setTick((t) => t + 1);
      }

      return (
        <div className="plate">
          <div className="eyebrow">
            <span className="line"></span>
            <span>تقويم العمر والأبراج</span>
            <span className="line"></span>
          </div>
          <h1>احسب عمرك وبرجك</h1>
          <p className="sub">أدخل تاريخ ميلادك لتعرف عمرك بالتفصيل، وبرجك الفلكي، وتاريخك بالتقويمين الهجري والميلادي · بتاريخ ٧ يونيو ٢٠٢٦</p>

          <div className="field">
            <label>تاريخ ميلادك</label>
            <div className="date-grid">
              <div className="col">
                <select value={day} onChange={(e) => setDay(e.target.value)}>
                  <option value="">اليوم</option>
                  {days.map((d) => <option key={d} value={d}>{toArabicDigits(d)}</option>)}
                </select>
              </div>
              <div className="col">
                <select value={month} onChange={(e) => setMonth(e.target.value)}>
                  <option value="">الشهر</option>
                  {MONTHS_AR.map((nm, i) => <option key={i} value={i + 1}>{nm}</option>)}
                </select>
              </div>
              <div className="col">
                <select value={year} onChange={(e) => setYear(e.target.value)}>
                  <option value="">السنة</option>
                  {years.map((y) => <option key={y} value={y}>{toArabicDigits(y)}</option>)}
                </select>
              </div>
            </div>
            <div className="row" style={{ marginTop: "14px" }}>
              <button style={{ flex: 1 }} onClick={compute}>اكشف النتيجة</button>
            </div>
            <div className="error">{error}</div>
          </div>

          {result && (
            <div className="results" key={tick}>
              <div className="celestial-divider">
                <span className="l"></span>
                <span className="star">✦</span>
                <span className="l"></span>
              </div>

              <div className="age-exact">
                <div className="age-cell">
                  <div className="num">{toArabicDigits(result.age.years)}</div>
                  <div className="lbl">سنة</div>
                </div>
                <div className="age-cell">
                  <div className="num">{toArabicDigits(result.age.months)}</div>
                  <div className="lbl">شهر</div>
                </div>
                <div className="age-cell">
                  <div className="num">{toArabicDigits(result.age.days)}</div>
                  <div className="lbl">يوم</div>
                </div>
              </div>

              <div className="zodiac">
                <div className="glyph">{result.zodiac.glyph}</div>
                <div className="meta">
                  <div className="k">برجك الفلكي</div>
                  <div className="name">{result.zodiac.name}</div>
                  <div className="range">{result.zodiac.range}</div>
                </div>
              </div>

              <Reading glyph="☼" kicker="تاريخ ميلادك بالميلادي" value={result.gregText} />
              <Reading
                glyph="☾"
                kicker="تاريخ ميلادك بالهجري"
                value={result.hijri}
                note="بحسب تقويم أم القرى."
              />
            </div>
          )}

          <div className="footer">صُمّم كلوحة إسطرلاب · React</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
