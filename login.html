<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول · تقويم العمر والأبراج</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>
  <div class="sky"></div>
  <div class="astrolabe"></div>
  <div class="astrolabe inner"></div>

  <div class="plate">
    <div class="eyebrow"><span class="line"></span><span>مرحباً بعودتك</span><span class="line"></span></div>
    <h1>تسجيل الدخول</h1>
    <p class="sub">ادخل إلى حسابك للوصول إلى الحاسبة</p>

    <div id="config-warning" class="config-warning" style="display:none">
      ⚠️ لم تُضبط مفاتيح Supabase بعد. افتح ملف <code>supabase-config.js</code> وضع
      <code>url</code> و <code>anonKey</code> من لوحة Supabase، ثم أعد تحميل الصفحة.
    </div>

    <div class="tabs">
      <button id="tab-email" class="active" onclick="switchTab('email')">بريد إلكتروني</button>
      <button id="tab-phone" onclick="switchTab('phone')">رقم جوال</button>
    </div>

    <!-- دخول بالبريد -->
    <form id="form-email" onsubmit="return loginEmail(event)">
      <label for="email">البريد الإلكتروني</label>
      <input id="email" type="email" placeholder="name@example.com" autocomplete="email" required />

      <label for="password">كلمة المرور</label>
      <input id="password" type="password" placeholder="كلمة المرور" autocomplete="current-password" required />

      <button type="submit" id="btn-email">دخول</button>
    </form>

    <!-- دخول برقم الجوال (OTP) -->
    <form id="form-phone" style="display:none" onsubmit="return sendOtp(event)">
      <label for="phone">رقم الجوال</label>
      <input id="phone" type="tel" placeholder="+9665XXXXXXXX" autocomplete="tel" />
      <button type="submit" id="btn-otp">أرسل رمز التحقق</button>

      <div id="otp-box" style="display:none">
        <label for="otp">رمز التحقق</label>
        <input id="otp" type="text" inputmode="numeric" placeholder="٦ أرقام" />
        <button type="button" id="btn-verify" onclick="verifyOtp()">تأكيد ودخول</button>
      </div>
    </form>

    <div class="divider"><span class="l"></span><span>أو</span><span class="l"></span></div>

    <button class="ghost" id="btn-google" onclick="loginGoogle()">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.7 1.22 9.2 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      المتابعة عبر Google
    </button>

    <div id="msg" class="msg"></div>

    <div class="alt">ليس لديك حساب؟ <a href="signup.html">أنشئ حساباً</a></div>
  </div>

  <script>
    const sb = window.getSupabase();
    const $ = (id) => document.getElementById(id);
    function showMsg(text, kind) { const m = $("msg"); m.textContent = text; m.className = "msg " + (kind || ""); }
    function setBusy(btn, busy, idleText) { btn.disabled = busy; btn.textContent = busy ? "جارٍ المعالجة…" : idleText; }

    if (!sb) { $("config-warning").style.display = "block"; }

    // إن كان المستخدم مسجّلاً مسبقاً، انقله مباشرة للحاسبة
    (async () => {
      if (!sb) return;
      const { data } = await sb.auth.getSession();
      if (data.session) window.location.href = window.APP_HOME;
    })();

    function switchTab(which) {
      const email = which === "email";
      $("tab-email").classList.toggle("active", email);
      $("tab-phone").classList.toggle("active", !email);
      $("form-email").style.display = email ? "block" : "none";
      $("form-phone").style.display = email ? "none" : "block";
      showMsg("");
    }

    async function loginEmail(e) {
      e.preventDefault();
      if (!sb) return showMsg("الإعداد غير مكتمل (راجع supabase-config.js).", "error"), false;
      const btn = $("btn-email");
      setBusy(btn, true);
      const { error } = await sb.auth.signInWithPassword({
        email: $("email").value.trim(),
        password: $("password").value,
      });
      setBusy(btn, false, "دخول");
      if (error) return showMsg(translate(error.message), "error"), false;
      window.location.href = window.APP_HOME;
      return false;
    }

    async function loginGoogle() {
      if (!sb) return showMsg("الإعداد غير مكتمل (راجع supabase-config.js).", "error");
      const redirectTo = new URL(window.APP_HOME, window.location.href).href;
      const { error } = await sb.auth.signInWithOAuth({ provider: "google", options: { redirectTo } });
      if (error) showMsg(translate(error.message), "error");
    }

    let phoneForOtp = "";
    async function sendOtp(e) {
      e.preventDefault();
      if (!sb) return showMsg("الإعداد غير مكتمل (راجع supabase-config.js).", "error"), false;
      phoneForOtp = $("phone").value.trim();
      if (!phoneForOtp) return showMsg("أدخل رقم الجوال بصيغة دولية مثل +9665XXXXXXXX.", "error"), false;
      const btn = $("btn-otp");
      setBusy(btn, true);
      const { error } = await sb.auth.signInWithOtp({ phone: phoneForOtp });
      setBusy(btn, false, "أرسل رمز التحقق");
      if (error) return showMsg(translate(error.message), "error"), false;
      $("otp-box").style.display = "block";
      showMsg("أُرسل رمز التحقق إلى جوالك.", "ok");
      return false;
    }

    async function verifyOtp() {
      if (!sb) return;
      const btn = $("btn-verify");
      setBusy(btn, true);
      const { error } = await sb.auth.verifyOtp({ phone: phoneForOtp, token: $("otp").value.trim(), type: "sms" });
      setBusy(btn, false, "تأكيد ودخول");
      if (error) return showMsg(translate(error.message), "error");
      window.location.href = window.APP_HOME;
    }

    function translate(msg) {
      const m = (msg || "").toLowerCase();
      if (m.includes("invalid login") || m.includes("invalid credentials")) return "البريد أو كلمة المرور غير صحيحة.";
      if (m.includes("email not confirmed")) return "لم تؤكّد بريدك بعد، تحقّق من رسالة التأكيد.";
      if (m.includes("provider is not enabled") || m.includes("not enabled")) return "هذه الطريقة غير مفعّلة في لوحة Supabase بعد.";
      if (m.includes("invalid")) return "بيانات غير صحيحة، تحقّق من المدخلات.";
      return msg;
    }
  </script>
</body>
</html>
